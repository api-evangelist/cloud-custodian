description: >-
  Cloud Custodian is an open-source rules engine for cloud security,
  compliance, and cost-optimization governance now stewarded by Stacklet.
  Operators express policies as YAML files that select a cloud resource
  type, apply filters, and execute actions; the engine then runs those
  policies against AWS, Azure, and GCP via provider-specific plugins.
  Custodian does not expose a developer REST API of its own - integration
  is via the c7n CLI, the policy YAML schema, c7n-org for multi-account
  fan-out, and c7n-mailer for SQS-driven notifications.
apis:
  - aid: cloud-custodian:cloud-custodian
    name: Cloud Custodian
    tags:
